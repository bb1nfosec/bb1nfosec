<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">

  <!-- Base -->
  <rect width="900" height="260" fill="#0d1117"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="900" height="260" fill="url(#grid)" opacity="0.6"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="260" fill="#9fef00"/>

  <!-- Faint horizontal rule -->
  <line x1="60" y1="175" x2="840" y2="175" stroke="#21262d" stroke-width="1"/>

  <!-- Name -->
  <text x="60" y="105" font-family="'Courier New',Courier,monospace" font-size="58" font-weight="700" fill="#e6edf3" letter-spacing="-1">bb1nfosec</text>

  <!-- Green underline accent under name -->
  <rect x="60" y="114" width="280" height="2" fill="#9fef00" opacity="0.8"/>

  <!-- Role line -->
  <text x="62" y="152" font-family="'Courier New',Courier,monospace" font-size="16" fill="#8b949e" letter-spacing="1">Red Team  ·  AI Security  ·  IoT  ·  AppSec</text>

  <!-- Conferences — bottom row -->
  <text x="62" y="205" font-family="'Courier New',Courier,monospace" font-size="12" fill="#3fb950" letter-spacing="0.5">speaker</text>
  <text x="122" y="205" font-family="'Courier New',Courier,monospace" font-size="12" fill="#484f58">@</text>
  <text x="136" y="205" font-family="'Courier New',Courier,monospace" font-size="12" fill="#8b949e">ThreatCon Kathmandu  ·  BalCCon Novi Sad  ·  DEFCon Trivandrum</text>

  <!-- Year badge — top right -->
  <rect x="768" y="28" width="110" height="36" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="823" y="42" font-family="'Courier New',Courier,monospace" font-size="10" fill="#9fef00" text-anchor="middle" letter-spacing="1">SINCE</text>
  <text x="823" y="57" font-family="'Courier New',Courier,monospace" font-size="16" font-weight="700" fill="#e6edf3" text-anchor="middle">2009</text>

  <!-- HoF badge -->
  <rect x="768" y="76" width="110" height="36" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="823" y="90" font-family="'Courier New',Courier,monospace" font-size="9" fill="#9fef00" text-anchor="middle" letter-spacing="1">HALL OF FAME</text>
  <text x="823" y="105" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e" text-anchor="middle">major cos</text>

  <!-- Bottom right — 16 yrs -->
  <text x="838" y="205" font-family="'Courier New',Courier,monospace" font-size="12" fill="#484f58" text-anchor="end">16 yrs</text>

  <!-- Subtle bottom fade -->
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect y="200" width="900" height="60" fill="url(#fade)"/>

</svg>

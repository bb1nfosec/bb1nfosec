<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 222" width="900" height="222" role="img"
     aria-label="bb1nfosec — independent security researcher and cybersecurity systems engineer working on critical infrastructure.">
  <defs>
    <!-- light palette: paper #f6f1e7 · bar #efe7d4 · brass #9a7414 · steel #366690 · ink #1a2230 · dim #6b6354 -->
    <clipPath id="type-l"><rect id="typebar-l" x="40" y="152" width="600" height="22"/></clipPath>
    <linearGradient id="sweep-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#9a7414" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9a7414" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9a7414" stop-opacity="0"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, "DejaVu Sans Mono", monospace; }
      .disp { font-family: "Segoe UI", "Helvetica Neue", Arial, system-ui, sans-serif; }
      #typebar-l { width: 600px; }
      .cursor-l { opacity: 1; transform: translateX(0); }
      .sweep-l  { opacity: 0; }
      @media (prefers-reduced-motion: no-preference) {
        #typebar-l { width: 0; animation: type-l 2.0s steps(60) 0.5s forwards; }
        .cursor-l  { animation: blink-l 1.05s steps(1) infinite, track-l 2.0s steps(60) 0.5s backwards; }
        .sweep-l   { opacity: 1; animation: scan-l 7s ease-in-out infinite; }
      }
      @keyframes type-l  { to { width: 600px; } }
      @keyframes blink-l { 50% { opacity: 0; } }
      @keyframes track-l { from { transform: translateX(-580px); } to { transform: translateX(0); } }
      @keyframes scan-l  { 0% { transform: translateY(-40px); } 100% { transform: translateY(214px); } }
    </style>
  </defs>

  <rect x="6" y="6" width="888" height="210" rx="11" fill="#f6f1e7" stroke="#dcd2bc" stroke-width="1.5"/>
  <path d="M6 17 a11 11 0 0 1 11 -11 H883 a11 11 0 0 1 11 11 V40 H6 Z" fill="#efe7d4"/>
  <line x1="6" y1="40" x2="894" y2="40" stroke="#dcd2bc" stroke-width="1"/>
  <circle cx="28" cy="23" r="5" fill="#6b6354" opacity="0.55"/>
  <circle cx="46" cy="23" r="5" fill="#366690" opacity="0.7"/>
  <circle cx="64" cy="23" r="5" fill="#9a7414" opacity="0.9"/>
  <text x="450" y="27" text-anchor="middle" class="mono" font-size="12" fill="#6b6354" letter-spacing="0.5">strategist@recon: ~/bb1nfosec</text>

  <rect class="sweep-l" x="7" y="41" width="886" height="40" fill="url(#sweep-l)"/>

  <text x="38" y="108" class="disp" font-size="52" font-weight="700" fill="#1a2230" letter-spacing="-1">bb1nfosec</text>
  <rect x="40" y="120" width="232" height="3" fill="#9a7414"/>

  <text x="40" y="150" class="mono" font-size="15" letter-spacing="0.3">
    <tspan fill="#9a7414">strategist@recon</tspan><tspan fill="#6b6354">:~$ </tspan><tspan fill="#1a2230">whoami</tspan>
  </text>

  <g clip-path="url(#type-l)">
    <text x="40" y="169" class="mono" font-size="15" letter-spacing="0.2" fill="#3a4250">independent security researcher · critical-infrastructure systems</text>
  </g>
  <rect class="cursor-l" x="630" y="156" width="9" height="16" fill="#9a7414"/>

  <line x1="40" y1="190" x2="860" y2="190" stroke="#dcd2bc" stroke-width="1"/>
  <text x="40" y="210" class="mono" font-size="12" fill="#6b6354" letter-spacing="0.4">source-code-review vuln research</text>
  <text x="860" y="210" text-anchor="end" class="mono" font-size="12" fill="#6b6354" letter-spacing="0.4">India · ORCID 0009-0001-7412-0211</text>
</svg>

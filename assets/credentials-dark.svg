<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 170" width="900" height="170" role="img"
     aria-label="Track record: 16+ years operating since 2009; 238 GitHub stars across 22 open-source repos; 5,165 Security StackExchange reputation; 119 Security StackExchange badges including 13 gold; halls of fame across HackerOne, Bugcrowd, Immunefi, Code4rena and YesWeHack.">
  <defs>
    <style>
      .mono{font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,"DejaVu Sans Mono",monospace}
      .num{font-weight:700;fill:#d4a72c}
      .sub{fill:#7d8590}
    </style>
  </defs>

  <text x="8" y="24" class="mono" font-size="13" fill="#7d8590" letter-spacing="0.5">~/track-record</text>

  <g class="mono">
    <rect x="8"   y="38" width="213" height="70" rx="8" fill="#10151c" stroke="#21262d"/>
    <rect x="8"   y="38" width="213" height="3"  rx="1.5" fill="#d4a72c" opacity="0.85"/>
    <text x="114.5" y="80" text-anchor="middle" class="num" font-size="23">16+ yrs</text>
    <text x="114.5" y="99" text-anchor="middle" class="sub" font-size="11">operating since 2009</text>

    <rect x="231" y="38" width="213" height="70" rx="8" fill="#10151c" stroke="#21262d"/>
    <rect x="231" y="38" width="213" height="3"  rx="1.5" fill="#5a91b4" opacity="0.85"/>
    <text x="337.5" y="80" text-anchor="middle" class="num" font-size="23">238 ★</text>
    <text x="337.5" y="99" text-anchor="middle" class="sub" font-size="11">across 22 OSS repos</text>

    <rect x="454" y="38" width="213" height="70" rx="8" fill="#10151c" stroke="#21262d"/>
    <rect x="454" y="38" width="213" height="3"  rx="1.5" fill="#d4a72c" opacity="0.85"/>
    <text x="560.5" y="80" text-anchor="middle" class="num" font-size="23">5,165</text>
    <text x="560.5" y="99" text-anchor="middle" class="sub" font-size="11">Security.SE reputation</text>

    <rect x="677" y="38" width="215" height="70" rx="8" fill="#10151c" stroke="#21262d"/>
    <rect x="677" y="38" width="215" height="3"  rx="1.5" fill="#5a91b4" opacity="0.85"/>
    <text x="784.5" y="80" text-anchor="middle" class="num" font-size="23">119</text>
    <text x="784.5" y="99" text-anchor="middle" class="sub" font-size="11">SE badges · 13 gold</text>
  </g>

  <line x1="8" y1="126" x2="892" y2="126" stroke="#21262d" stroke-width="1"/>
  <text x="8" y="148" class="mono" font-size="12" letter-spacing="0.3">
    <tspan fill="#d4a72c">halls of fame</tspan><tspan fill="#7d8590">  ·  HackerOne · Bugcrowd · Immunefi · Code4rena · YesWeHack</tspan>
  </text>
</svg>

    <linearGradient id="sweep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#d4a72c" stop-opacity="0"/>
      <stop offset=".5"  stop-color="#d4a72c" stop-opacity=".07"/>
      <stop offset="1"   stop-color="#d4a72c" stop-opacity="0"/>
    </linearGradient>
    <style>
      @font-face {
        font-family: "JBMSub";
        src: url(data:font/woff2;base64,) format("woff2");
      }
      .m  { font-family: "JBMSub", ui-monospace, Menlo, Consolas, monospace; }
      /* static state = finished frame (reduced-motion fallback) */
      .rv-cmd   { width: 50.4px; }
      .rv-out   { width: 621.6px; }
      .cur-a    { opacity: 0; }
      .line-c   { opacity: 1; }
      .cur-c    { opacity: 1; }
      .sweepband{ opacity: 0; }
      .rule     { transform: scaleX(1); transform-origin: 238px 0; }
      .draw     { stroke-dasharray: 1; stroke-dashoffset: 0; }
      .ring     { transform-origin: 124px 158px; }
      @media (prefers-reduced-motion: no-preference) {
        .rv-cmd { width: 0; animation: grow-cmd .72s steps(6,end) .6s forwards; }
        .rv-out { width: 0; animation: grow-out 1.1s steps(74,end) 1.55s forwards; }
        .cur-a  { animation: show-a 1.35s steps(1,end), track-a .72s steps(6,end) .6s both; }
        .line-c { opacity: 0; animation: appear .01s linear 2.85s forwards; }
        .cur-c  { opacity: 0; animation: appear .01s linear 2.85s forwards, blink 1.1s steps(1,end) 2.85s infinite; }
        .rule   { transform: scaleX(0); animation: grow-rule .7s cubic-bezier(.2,.6,.2,1) .35s forwards; }
        .draw   { stroke-dashoffset: 1; animation: draw-in 1.7s cubic-bezier(.4,0,.2,1) .2s forwards; }
        .ring   { animation: turn 48s linear infinite; }
        .sweepband { animation: sweep 9s ease-in-out 2s infinite; }
      }
      @keyframes grow-cmd  { to { width: 50.4px; } }
      @keyframes grow-out  { to { width: 621.6px; } }
      @keyframes show-a    { 0%, 99% { opacity: 1; } 100% { opacity: 0; } }
      @keyframes track-a   { from { transform: translateX(0); } to { transform: translateX(50.4px); } }
      @keyframes appear    { to { opacity: 1; } }
      @keyframes blink     { 50% { opacity: 0; } }
      @keyframes grow-rule { to { transform: scaleX(1); } }
      @keyframes draw-in   { to { stroke-dashoffset: 0; } }
      @keyframes turn      { to { transform: rotate(360deg); } }
      @keyframes sweep     { 0% { opacity: 0; transform: translateY(0); } 12% { opacity: 1; } 88% { opacity: 1; } 100% { opacity: 0; transform: translateY(206px); } }
    </style>
  </defs>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 270" width="960" height="270" role="img" aria-label="bb1nfosec — independent security researcher and critical-infrastructure systems engineer. Terminal dossier: a prompt types out the whoami line. Letterhead: chanakya, bheeshma, vaathi — strategy, guardianship, teaching. India, est. 2009.">
  <title>bb1nfosec — strategist&apos;s terminal dossier</title>
  <defs>
